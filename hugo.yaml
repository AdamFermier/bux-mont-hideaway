baseURL: https://bux-mont-hideaway.org/
title: Bux-Mont Hideaway
theme: [github.com/google/docsy]

contentDir: content
defaultContentLanguage: en
defaultContentLanguageInSubdir: false

enableRobotsTXT: true
enableGitInfo: false

# Docsy requires this for syntax highlighting
pygmentsCodeFences: true
pygmentsUseClasses: false
pygmentsUseClassic: false
pygmentsStyle: tango

disableKinds:
  - taxonomy
  - term

imaging:
  resampleFilter: CatmullRom
  quality: 75
  anchor: smart

outputs:
  section:
    - HTML
    - RSS

languages:
  en:
    label: English
    contentDir: content/en
    params:
      description: A personal hideaway — stories, photos, and everyday moments from Bucks-Montgomery county.

markup:
  goldmark:
    parser:
      attribute:
        block: true
    renderer:
      unsafe: true
  highlight:
    style: tango

params:
  copyright: Bux-Mont Hideaway
  privacy_policy: ""

  ui:
    breadcrumb_disable: false
    footer_about_enable: false
    navbar_logo: false
    navbar_translucent_over_cover_disable: true
    sidebar_menu_compact: true
    sidebar_search_disable: true
    # Large, readable fonts for comfortable reading
    showLightDarkModeMenu: true

  links:
    # No social links needed for now

  plantuml:
    enable: false

  markmap:
    enable: false

  mermaid:
    enable: false

module:
  hugoVersion:
    extended: true
    min: 0.110.0
  imports:
    - path: github.com/google/docsy
      disable: false
