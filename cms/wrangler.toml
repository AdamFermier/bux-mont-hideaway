name = "bux-mont-hideaway-cms"
main = "src/index.js"
compatibility_date = "2024-11-01"
compatibility_flags = ["nodejs_compat"]

[[rules]]
type = "Text"
globs = ["**/*.html"]
fallthrough = true

[[kv_namespaces]]
binding = "SESSIONS"
id = "21dae3ac56c645ecb708f8e31ab8e762"
preview_id = "d9055fff0d9541e59e220a89244de090"

[[d1_databases]]
binding = "DB"
database_name = "scribe-it"
database_id = "41958058-aed4-41bf-968a-6faf4e10ade9"

[[routes]]
pattern = "*.scribe-it.app/*"
zone_name = "scribe-it.app"

# Secrets (set via `wrangler secret put <NAME>`):
#   ANTHROPIC_API_KEY
#   SESSION_SECRET
#   RESEND_API_KEY
#   ADMIN_EMAIL      (adam.fermier@gmail.com)
